format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: ios

workflows:
  run-test-ios-26:
    envs:
    - SCAN_DEVICE: "iPhone 17 (26.2)"
    triggers:
      push:
      - branch: main
      pull_request:
      - target_branch: main
    meta:
      bitrise.io:
        stack: osx-xcode-26.3.x
        machine_type_id: g2.mac.4large
    steps:

    - git-clone@8: {}

    - script@1:
        title: Print Xcode version
        inputs:
        - content: |
            set -eo pipefail
            set -x
            xcode-select -p
            xcodebuild -version

    - script@1:
        title: Validate Package.swift
        inputs:
        - content: |
            set -eo pipefail
            set -x
            swift package describe

    - script@1:
        title: Set up Ruby and install dependencies
        inputs:
        - content: |
            set -eo pipefail
            set -x
            ruby -v
            bundle config set --local clean 'true'
            bundle config set --local path 'vendor/bundle'
            bundle install

    - script@1:
        title: Install xcbeautify
        inputs:
        - content: |
            set -eo pipefail
            set -x
            brew install xcbeautify

    - script@1:
        title: SPM Release Build (Xcode 26)
        timeout: 1800
        inputs:
        - content: |
            set -eo pipefail
            set -x
            swift build -c release --target RevenueCat

    - script@1:
        title: Run iOS 26 tests
        timeout: 900
        inputs:
        - content: |
            set -eo pipefail
            set -x
            bundle exec fastlane test_ios

    - script@1:
        title: Compress result bundle
        is_always_run: true
        inputs:
        - content: |
            set -eo pipefail
            set -x
            BUNDLE="fastlane/test_output/xctest/ios/RevenueCat.xcresult"
            if [ -d "$BUNDLE" ]; then
              tar -czf "$BUNDLE.tar.gz" -C "fastlane/test_output/xctest/ios" "RevenueCat.xcresult"
              cp "$BUNDLE.tar.gz" "$BITRISE_DEPLOY_DIR/"
              rm -r "$BUNDLE"
            fi

    - deploy-to-bitrise-io@2: {}

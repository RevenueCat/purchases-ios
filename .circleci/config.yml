version: 2.1

setup: true

orbs:
  continuation: circleci/continuation@1.1.0

# These parameters mirror the ones in continue_config.yml so that
# externally-triggered pipelines (API, scheduled, GitHub Actions) can
# pass values through to the continuation config.
parameters:
  action:
    type: enum
    enum:
      [
        default,
        bump,
        run-manual-tests,
        run-manual-docs-deploy,
        update_paywall_templates,
        record_paywall_screenshots,
        tuist,
        deploy_rct_tester
      ]
    default: default
  generate_snapshots:
    default: false
    type: boolean
  generate_revenuecatui_snapshots:
    default: false
    type: boolean
  generate_swiftinterface:
    default: false
    type: boolean
  GHA_Event:
    type: string
    default: ""
  GHA_Actor:
    type: string
    default: ""
  GHA_Action:
    type: string
    default: ""
  GHA_Meta:
    type: string
    default: ""

jobs:
  setup-dynamic-config:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - checkout
      - run:
          name: Forward pipeline parameters to continuation config
          command: |
            # Build the parameter JSON forwarding all original pipeline
            # parameters to the continuation config.
            # Add new path-based parameters here as needed.
            python3 -c "
            import json, sys
            params = {
                'action': sys.argv[1],
                'generate_snapshots': sys.argv[2] == 'true',
                'generate_revenuecatui_snapshots': sys.argv[3] == 'true',
                'generate_swiftinterface': sys.argv[4] == 'true',
                'GHA_Event': sys.argv[5],
                'GHA_Actor': sys.argv[6],
                'GHA_Action': sys.argv[7],
                'GHA_Meta': sys.argv[8],
            }
            with open('/tmp/pipeline-parameters.json', 'w') as f:
                json.dump(params, f, indent=2)
            print('Generated parameters:')
            print(json.dumps(params, indent=2))
            " \
              "<< pipeline.parameters.action >>" \
              "<< pipeline.parameters.generate_snapshots >>" \
              "<< pipeline.parameters.generate_revenuecatui_snapshots >>" \
              "<< pipeline.parameters.generate_swiftinterface >>" \
              "<< pipeline.parameters.GHA_Event >>" \
              "<< pipeline.parameters.GHA_Actor >>" \
              "<< pipeline.parameters.GHA_Action >>" \
              "<< pipeline.parameters.GHA_Meta >>"
      - continuation/continue:
          parameters: /tmp/pipeline-parameters.json
          configuration_path: .circleci/continue_config.yml

workflows:
  setup:
    jobs:
      - setup-dynamic-config

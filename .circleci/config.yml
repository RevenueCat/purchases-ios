  installation-tests-all-but-carthage:
    executor:
      name: macos-executor
    steps:
      # === Common setup ===
      - checkout-with-minimal-permissions
      - install-dependencies
      - update-spm-installation-commit
      - run:
          name: Replace API key
          command: bundle exec fastlane replace_api_key_integration_tests

      # Install per-test dependencies
      - install-dependencies:
          directory: Tests/InstallationTests/CocoapodsInstallation
      - install-dependencies:
          directory: Tests/InstallationTests/SPMInstallation/
      - install-dependencies:
          directory: Tests/InstallationTests/SPMCustomEntitlementComputationInstallation/
      - install-dependencies:
          directory: Tests/InstallationTests/ReceiptParserInstallation/
      - install-dependencies:
          directory: Tests/InstallationTests/XcodeDirectInstallation/

      # Restore all caches upfront (before any test can fail, so restore_cache always runs)
      - restore-installation-test-cache:
          test-name: cocoapods
      - restore-installation-test-cache:
          test-name: spm
      - restore-installation-test-cache:
          test-name: spm-custom-entitlement-computation
      - restore-installation-test-cache:
          test-name: receipt-parser
      - restore-installation-test-cache:
          test-name: xcode-direct-integration

      # Initialize test status tracking
      - run:
          name: Initialize test tracking
          command: mkdir -p /tmp/test_status

      # === Installation Tests ===
      # Each test checks for a cached success marker before running.
      # On success, a marker is saved to cache so retries skip passing tests.
      # Test steps always exit 0 so that save_cache reliably runs.
      # Failures are reported in the "Result" steps at the end.

      - run-installation-test:
          test-name: cocoapods
          display-name: CocoaPods
          directory: Tests/InstallationTests/CocoapodsInstallation
          test-commands: |
            bundle exec pod install
            bundle exec fastlane scan
            bundle exec fastlane archive
      - run-installation-test:
          test-name: spm
          display-name: Swift Package Manager
          directory: Tests/InstallationTests/SPMInstallation
          test-commands: |
            bundle exec fastlane scan
            bundle exec fastlane archive_all_platforms
      - run-installation-test:
          test-name: spm-custom-entitlement-computation
          display-name: Custom Entitlement Computation SPM
          directory: Tests/InstallationTests/SPMCustomEntitlementComputationInstallation
          test-commands: |
            bundle exec fastlane scan
      - run-installation-test:
          test-name: receipt-parser
          display-name: Receipt Parser
          directory: Tests/InstallationTests/ReceiptParserInstallation
          test-commands: |
            bundle exec fastlane scan
            bundle exec fastlane archive_all_platforms
      - run-installation-test:
          test-name: xcode-direct-integration
          display-name: Xcode Direct Integration
          directory: Tests/InstallationTests/XcodeDirectInstallation
          test-commands: |
            bundle exec fastlane scan
            bundle exec fastlane archive

      # === Results ===
      # These steps report pass/fail visually. They use when: always so they
      # execute even after a previous result step or test step fails.
      - report-installation-test-result:
          test-name: cocoapods
          display-name: CocoaPods
      - report-installation-test-result:
          test-name: spm
          display-name: Swift Package Manager
      - report-installation-test-result:
          test-name: spm-custom-entitlement-computation
          display-name: Custom Entitlement Computation SPM
      - report-installation-test-result:
          test-name: receipt-parser
          display-name: Receipt Parser
      - report-installation-test-result:
          test-name: xcode-direct-integration
          display-name: Xcode Direct Integration

      # Slack notification with failed test details
      - run:
          name: Collect failed test names for Slack
          when: always
          command: |
            echo 'export SLACK_ACCESS_TOKEN="${SLACK_ACCESS_TOKEN_CIRCLE_CI_NOTIFY_ORB_IOS}"' >> $BASH_ENV
            echo 'export SLACK_DEFAULT_CHANNEL="${SLACK_DEFAULT_CHANNEL_CIRCLE_CI_NOTIFY_ORB_IOS}"' >> $BASH_ENV
            FAILED_TESTS=""
            for test in cocoapods spm spm-custom-entitlement-computation receipt-parser xcode-direct-integration; do
              STATUS_FILE="/tmp/test_status/$test"
              if [ ! -f "$STATUS_FILE" ]; then
                FAILED_TESTS="${FAILED_TESTS:+$FAILED_TESTS, }$test (did not run)"
              else
                STATUS=$(cat "$STATUS_FILE")
                if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "STARTED" ]; then
                  FAILED_TESTS="${FAILED_TESTS:+$FAILED_TESTS, }$test"
                fi
              fi
            done
            if [ -z "$FAILED_TESTS" ]; then
              FAILED_TESTS="(none detected)"
            fi
            echo "export FAILED_INSTALLATION_TESTS=\"$FAILED_TESTS\"" >> $BASH_ENV
      - slack/notify:
          branch_pattern: main
          channel: "feed-circleci-ios-failures"
          event: fail
          custom: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":red_circle: *${CIRCLE_JOB}* failed on branch `${CIRCLE_BRANCH}`\n\nFailed installation tests: ${FAILED_INSTALLATION_TESTS}\n\n<${CIRCLE_BUILD_URL}|View Job>"
                  }
                }
              ]
            }

  installation-tests-carthage:

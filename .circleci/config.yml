version: 2.1

setup: true

orbs:
  continuation: circleci/continuation@1.1.0

# Pipeline parameters accepted via the API / CircleCI UI.
# All parameters declared here are implicitly forwarded to default_config.yml.
parameters:
  action:
    type: enum
    enum:
      [
        default,
        bump,
        run-manual-docs-deploy,
        update_paywall_templates,
        record_paywall_screenshots,
        deploy_rct_tester
      ]
    default: default
  generate_snapshots:
    type: boolean
    default: false
  generate_revenuecatui_snapshots:
    type: boolean
    default: false
  generate_swiftinterface:
    type: boolean
    default: false
  # Set via CircleCI API by the GitHub Action when a PR comment like
  # "@RCGitBot please test <job1> <job2> <job3>" is posted.
  requested_jobs:
    type: string
    default: ""
  # params used by the trigger CircleCI Pipeline GitHub Action: https://github.com/marketplace/actions/trigger-circleci-pipeline
  GHA_Event:
    type: string
    default: ""
  GHA_Actor:
    type: string
    default: ""
  GHA_Action:
    type: string
    default: ""
  GHA_Meta:
    type: string
    default: ""

jobs:
  setup-dynamic-config:
    docker:
      - image: cimg/node:current
    resource_class: small
    steps:
      - checkout
      - when:
          condition: << pipeline.parameters.requested_jobs >>
          steps:
            - run:
                name: Generate requested jobs configuration
                environment:
                  REQUESTED_JOBS: << pipeline.parameters.requested_jobs >>
                command: node .circleci/generate-requested-jobs-config.js
            - continuation/continue:
                configuration_path: /tmp/requested-jobs-config.yml
      - unless:
          condition: << pipeline.parameters.requested_jobs >>
          steps:
            - continuation/continue:
                configuration_path: .circleci/default_config.yml

workflows:
  setup:
    jobs:
      - setup-dynamic-config

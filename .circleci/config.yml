version: 2.1

setup: true

orbs:
  continuation: circleci/continuation@1.1.0

# These parameters mirror the ones in continue_config.yml so that
# externally-triggered pipelines (API, scheduled, GitHub Actions) can
# pass values through to the continuation config.
parameters:
  action:
    type: enum
    enum:
      [
        default,
        bump,
        run-manual-tests,
        run-manual-docs-deploy,
        update_paywall_templates,
        record_paywall_screenshots,
        tuist,
        deploy_rct_tester
      ]
    default: default
  generate_snapshots:
    default: false
    type: boolean
  generate_revenuecatui_snapshots:
    default: false
    type: boolean
  generate_swiftinterface:
    default: false
    type: boolean
  GHA_Event:
    type: string
    default: ""
  GHA_Actor:
    type: string
    default: ""
  GHA_Action:
    type: string
    default: ""
  GHA_Meta:
    type: string
    default: ""
  # Set via CircleCI API by the GitHub Action when a PR comment like
  # "@RCGitBot please test <job1> <job2>, <job3>" is posted.
  requested_jobs:
    type: string
    default: ""

jobs:
  setup-dynamic-config:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - checkout
      - run:
          name: Determine pipeline configuration
          command: |
            REQUESTED_JOBS="<< pipeline.parameters.requested_jobs >>"

            if [ -n "$REQUESTED_JOBS" ]; then
              echo "On-demand job(s) requested: $REQUESTED_JOBS"

              # Normalize: replace commas with spaces, collapse whitespace
              JOBS=$(echo "$REQUESTED_JOBS" | tr ',' ' ' | xargs)

              # Release/deployment jobs that must not be triggered on-demand
              BLOCKED="release-checks make-release push-revenuecat-pod push-revenuecatui-pod
                prepare-next-version release-train deploy-purchase-tester deploy-rct-tester
                deploy-paywalls-tester deploy-to-spm deploy-to-purchases-ios-admob
                bump-sdk-in-rc-mobile-app docs-deploy cocoapods-token-keepalive"

              for JOB in $JOBS; do
                for B in $BLOCKED; do
                  if [ "$JOB" = "$B" ]; then
                    echo "ERROR: '$JOB' is a release/deployment job and cannot be triggered on-demand."
                    exit 1
                  fi
                done
              done

              # Copy continue_config.yml up to "workflows:" and append
              # a generated workflow containing only the requested job(s).
              CONFIG=".circleci/continue_config.yml"
              WF_LINE=$(grep -n '^workflows:' "$CONFIG" | head -1 | cut -d: -f1)
              head -n "$WF_LINE" "$CONFIG" > /tmp/on-demand-config.yml

              {
                echo "  on-demand-jobs:"
                echo "    jobs:"
                for JOB in $JOBS; do
                  echo "      - ${JOB}:"
                  echo "          context:"
                  echo "            - slack-secrets"
                done
              } >> /tmp/on-demand-config.yml

              echo '{}' > /tmp/pipeline-parameters.json
            else
              echo "Normal pipeline — forwarding parameters to continuation config"

              cat > /tmp/pipeline-parameters.json \<< PARAMS_EOF
            {
              "action": "<< pipeline.parameters.action >>",
              "generate_snapshots": << pipeline.parameters.generate_snapshots >>,
              "generate_revenuecatui_snapshots": << pipeline.parameters.generate_revenuecatui_snapshots >>,
              "generate_swiftinterface": << pipeline.parameters.generate_swiftinterface >>,
              "GHA_Event": "<< pipeline.parameters.GHA_Event >>",
              "GHA_Actor": "<< pipeline.parameters.GHA_Actor >>",
              "GHA_Action": "<< pipeline.parameters.GHA_Action >>",
              "GHA_Meta": "<< pipeline.parameters.GHA_Meta >>"
            }
            PARAMS_EOF
              echo "Generated parameters:"
              cat /tmp/pipeline-parameters.json
            fi
      - when:
          condition: << pipeline.parameters.requested_jobs >>
          steps:
            - continuation/continue:
                parameters: /tmp/pipeline-parameters.json
                configuration_path: /tmp/on-demand-config.yml
      - unless:
          condition: << pipeline.parameters.requested_jobs >>
          steps:
            - continuation/continue:
                parameters: /tmp/pipeline-parameters.json
                configuration_path: .circleci/continue_config.yml

workflows:
  setup:
    jobs:
      - setup-dynamic-config

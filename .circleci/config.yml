  run-all-maestro-e2e-tests:
    executor:
      name: macos-executor
      xcode_version: "26.3"
    steps:
      - macos/preboot-simulator:
          version: "18.6"
          platform: "iOS"
          device: "iPhone 16 Pro"
      - checkout
      - install-dependencies
      - revenuecat/install-maestro
      - tuist-generate-workspace:
          query: "Maestro"
      # Create directory to track test failures
      - run:
          name: Initialize test tracking
          command: mkdir -p /tmp/test_exit_codes
      # Run app_store tests for all backend environments
      - run:
          name: Set API key for app_store e2e tests
          command: |
            echo 'export REVENUECAT_API_KEY="${RC_E2E_TEST_API_KEY_PRODUCTION_APP_STORE}"' >> $BASH_ENV
      - run:
          name: Run e2e tests (production, app_store)
          command: |
            bundle exec fastlane run_maestro_e2e_tests backend_environment:production store:app_store output_dir:test_output/production_app_store skip_slack_notification:true \
              && echo "0" > /tmp/test_exit_codes/production_app_store \
              || (echo "1" > /tmp/test_exit_codes/production_app_store && exit 1)
          no_output_timeout: 15m
      - run:
          name: Run e2e tests (load_shedder_us_east_1, app_store)
          when: always
          command: |
            bundle exec fastlane run_maestro_e2e_tests backend_environment:load_shedder_us_east_1 store:app_store output_dir:test_output/load_shedder_us_east_1_app_store skip_slack_notification:true \
              && echo "0" > /tmp/test_exit_codes/load_shedder_us_east_1_app_store \
              || (echo "1" > /tmp/test_exit_codes/load_shedder_us_east_1_app_store && exit 1)
          no_output_timeout: 15m
      - run:
          name: Run e2e tests (load_shedder_us_east_2, app_store)
          when: always
          command: |
            bundle exec fastlane run_maestro_e2e_tests backend_environment:load_shedder_us_east_2 store:app_store output_dir:test_output/load_shedder_us_east_2_app_store skip_slack_notification:true \
              && echo "0" > /tmp/test_exit_codes/load_shedder_us_east_2_app_store \
              || (echo "1" > /tmp/test_exit_codes/load_shedder_us_east_2_app_store && exit 1)
          no_output_timeout: 15m
      - run:
          name: Run e2e tests (fallback, app_store)
          when: always
          command: |
            bundle exec fastlane run_maestro_e2e_tests backend_environment:fallback store:app_store output_dir:test_output/fallback_app_store skip_slack_notification:true \
              && echo "0" > /tmp/test_exit_codes/fallback_app_store \
              || (echo "1" > /tmp/test_exit_codes/fallback_app_store && exit 1)
          no_output_timeout: 15m
      # Run test_store test (production only)
      - run:
          name: Set API key for test_store e2e tests
          when: always
          command: |
            echo 'export REVENUECAT_API_KEY="${RC_E2E_TEST_API_KEY_PRODUCTION_TEST_STORE}"' >> $BASH_ENV
      - run:
          name: Run e2e tests (production, test_store)
          when: always
          command: |
            bundle exec fastlane run_maestro_e2e_tests backend_environment:production store:test_store output_dir:test_output/production_test_store skip_slack_notification:true \
              && echo "0" > /tmp/test_exit_codes/production_test_store \
              || (echo "1" > /tmp/test_exit_codes/production_test_store && exit 1)
          no_output_timeout: 15m
      - store_test_results:
          path: fastlane/test_output
      - store_artifacts:
          path: fastlane/test_output
      # Send consolidated Slack notification
      - run:
          name: Send Slack notification
          command: |
            if grep -q "1" /tmp/test_exit_codes/*; then
              FAILED_TESTS=$(grep -l "1" /tmp/test_exit_codes/* | xargs -I {} basename {} | tr '\n' ', ' | sed 's/,$//')
              bundle exec fastlane run slack_backend_integration_test_results \
                environment:"maestro_e2e (failed: $FAILED_TESTS)" \
                success:false \
                message_binary_solo_on_failure:false
            else
              bundle exec fastlane run slack_backend_integration_test_results \
                environment:"maestro_e2e (all environments)" \
                success:true \
                message_binary_solo_on_failure:false
            fi
          when: always
      # Check if any tests failed and fail the job if so
      - run:
          name: Check for test failures
          command: |
            if grep -q "1" /tmp/test_exit_codes/*; then
              echo "One or more test suites failed:"
              grep -l "1" /tmp/test_exit_codes/* | xargs -I {} basename {}
              exit 1
            fi
            echo "All test suites passed!"
          when: always

  release-checks:
    executor:
      name: macos-executor
    steps:
      - checkout
      - trust-github-key
      # Bundler
      - restore_cache:
          keys:
            - v2-gem-cache-{{ checksum "Gemfile.lock" }}-{{ arch }}
      - run: bundle install --clean --path vendor/bundle
      - save_cache:
          key: v2-gem-cache-{{ checksum "Gemfile.lock" }}-{{ arch }}
          paths:
            - vendor/bundle
      - install-dependencies
      - update-spm-installation-commit
      - revenuecat/install-tuist
      - run:
          name: Deployment checks
          command: bundle exec fastlane release_checks
          environment:
            SCAN_SCHEME: All Tests
          no_output_timeout: 30m
      - store_test_results:
          path: fastlane/test_output
      - store_artifacts:
          path: fastlane/test_output/report.html
          destination: test_report.html
      - store_artifacts:
          path: RevenueCat.xcframework.zip
          destination: RevenueCat.xcframework.zip
      - store_artifacts:
          path: RevenueCatUI.xcframework.zip
          destination: RevenueCatUI.xcframework.zip
      - slack-notify-on-fail


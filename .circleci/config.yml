orbs:
  macos: circleci/macos@2.5.1
  slack: circleci/slack@5.0.0
  revenuecat: revenuecat/sdks-common-config@dev:045d2d8cd7ac24d4591c662de97e133c1eff795a
  # Disabled until compatible with M1: codecov: codecov/codecov@3.3.0
  # codecov: codecov/codecov@3.3.0

version: 2.1

parameters:
  action:
    type: enum
    enum:
      [
        default,
        bump,
        run-manual-tests,
        run-manual-docs-deploy,
        update_paywall_templates,
        record_paywall_screenshots,
        tuist,
        deploy_rct_tester
      ]
    default: default
  generate_snapshots:
    default: false
    type: boolean
  generate_revenuecatui_snapshots:
    default: false
    type: boolean
  generate_swiftinterface:
    default: false
    type: boolean
  # params used by the trigger CircleCI Pipeline GitHub Action: https://github.com/marketplace/actions/trigger-circleci-pipeline
  GHA_Event:
    type: string
    default: ""
  GHA_Actor:
    type: string
    default: ""
  GHA_Action:
    type: string
    default: ""
  GHA_Meta:
    type: string
    default: ""

executors:
  macos-executor:
    parameters:
      xcode_version:
        type: string
        default: "16.4"
    macos:
      # circleci-lint: disable=unknown-xcode-version
      xcode: << parameters.xcode_version >>
    resource_class: m4pro.medium
    environment:
      CIRCLECI_TESTS_GENERATE_SNAPSHOTS: << pipeline.parameters.generate_snapshots >>
      CIRCLECI_TESTS_GENERATE_REVENUECAT_UI_SNAPSHOTS: << pipeline.parameters.generate_revenuecatui_snapshots >>
    working_directory: ~/purchases-ios
    shell: /bin/bash --login -o pipefail
  macos-executor-large:
    parameters:
      xcode_version:
        type: string
        default: "16.4"
    macos:
      # circleci-lint: disable=unknown-xcode-version
      xcode: << parameters.xcode_version >>
    resource_class: m4pro.medium
    environment:
      CIRCLECI_TESTS_GENERATE_SNAPSHOTS: << pipeline.parameters.generate_snapshots >>
      CIRCLECI_TESTS_GENERATE_REVENUECAT_UI_SNAPSHOTS: << pipeline.parameters.generate_revenuecatui_snapshots >>
    working_directory: ~/purchases-ios
    shell: /bin/bash --login -o pipefail

aliases:
  release-branches: &release-branches
    filters:
      tags:
        ignore: /.*/
      branches:
        only: /^release\/.*/
  release-tags: &release-tags
    filters:
      tags:
        ignore:
          - /^.*-SNAPSHOT/
          - /^.*-customercenter.alpha.*/
      branches:
        ignore: /.*/
  release-branches-and-main: &release-branches-and-main
    filters:
      tags:
        ignore: /.*/
      branches:
        only:
          - main
          - paywalls
          - /^release\/.*/
  only-main-branch: &only-main-branch
    filters:
      tags:
        ignore: /.*/
      branches:
        only: main
  swiftinterface-xcode-version: &swiftinterface-xcode-version "26.2"
commands:
  slack-notify-on-fail:
    steps:
      # Map custom variable names to the Slack orb variables, since the default variable names are already used by the Fastlane Slack integration
      # we will probably remove these at some point when we move all jobs to use the Fastlane Slack integration
      # Note: It's safe to modify SLACK_ACCESS_TOKEN and SLACK_DEFAULT_CHANNEL here because this command is always
      # called as the last step in jobs, so it won't interfere with Fastlane commands that run before it
      - run:
          name: Set Slack environment variables
          when: always
          command: |
            echo 'export SLACK_ACCESS_TOKEN="${SLACK_ACCESS_TOKEN_CIRCLE_CI_NOTIFY_ORB_IOS}"' >> $BASH_ENV
            echo 'export SLACK_DEFAULT_CHANNEL="${SLACK_DEFAULT_CHANNEL_CIRCLE_CI_NOTIFY_ORB_IOS}"' >> $BASH_ENV
      - slack/notify:
          branch_pattern: main
          channel: "feed-circleci-ios-failures"
          event: fail
          template: basic_fail_1

  install-runtime:
    parameters:
      runtime-name:
        type: string
    steps:
      - install-dependencies:
          install_xcbeautify: false
          install_xcodes: true
      - run:
          name: Install simulator
          command: | # Print all available simulators and install required one
            xcodes runtimes
            sudo xcodes runtimes install "<< parameters.runtime-name >>"

  install-bundle-dependencies:
    parameters:
      directory:
        type: string
        default: .
    steps:
      - run:
          name: Write macOS Product Version to file
          command: |
            sw_vers -productVersion | cut -d. -f1,2 > .macos_version
            echo "macOS version: $(cat .macos_version)"
      - restore_cache:
          keys:
            # This cache key should be updated whenever we change the Ruby version
            - v4-gem-cache-{{ checksum "Gemfile.lock" }}-{{ arch }}-macos-{{ checksum ".macos_version" }}-ruby-3.2.0
      # CircleCI images fail on Ruby 3.3
      # https://github.com/fastlane/fastlane/issues/21794#issuecomment-2021331335
      # Also, not using macos/switch-ruby because its broken
      - run:
          # We're using Ruby 3.2.0 here to avoid an issue that caused a crash with Fastlane and Ruby 3.2.2.
          name: Set Ruby 3.2.0
          command: |
            eval "$(rbenv init -)"
            rbenv install -s 3.2.0  # Replace with your required Ruby version
            rbenv global 3.2.0
            rbenv rehash
      - run:
          name: Verify Ruby version
          command: ruby -v
      - run:
          name: Bundle install
          working_directory: << parameters.directory >>
          command: |
            bundle config set --local clean 'true'
            bundle config set --local path 'vendor/bundle'
            bundle install
      - save_cache:
          # This cache key should be updated whenever we change the Ruby version
          key: v4-gem-cache-{{ checksum "Gemfile.lock" }}-{{ arch }}-macos-{{ checksum ".macos_version" }}-ruby-3.2.0
          paths:
            - vendor/bundle
            - ~/.rbenv/versions/3.2.0

  install-dependencies:
    parameters:
      directory:
        type: string
        default: .
      install_xcbeautify:
        type: boolean
        default: true
      install_mint:
        type: boolean
        default: false
      install_xcodes:
        type: boolean
        default: false
    steps:
      - install-bundle-dependencies:
          directory: << parameters.directory >>
      - run:
          name: Generate homebrew cache key
          command: |
            echo "xcbeautify:<< parameters.install_xcbeautify >>" > .homebrew-deps
            echo "mint:<< parameters.install_mint >>" >> .homebrew-deps
            echo "xcodes:<< parameters.install_xcodes >>" >> .homebrew-deps
      - restore_cache:
          keys:
            - v2-homebrew-cache-{{ checksum ".homebrew-deps" }}-{{ arch }}
      - when:
          condition: << parameters.install_xcbeautify >>
          steps:
            - install-brew-dependency:
                dependency_name: "xcbeautify"
      - when:
          condition: << parameters.install_mint >>
          steps:
            - install-brew-dependency:
                dependency_name: "mint"
      - when:
          condition: << parameters.install_xcodes >>
          steps:
            - install-brew-dependency:
                dependency_name: "xcodes"
      - save_cache:
          key: v2-homebrew-cache-{{ checksum ".homebrew-deps" }}-{{ arch }}
          paths:
            - /opt/homebrew/Cellar/xcbeautify/
            - /opt/homebrew/Cellar/xcodes/
            - /Users/$USER/Library/Caches/Homebrew/

  install-brew-dependency:
    parameters:
      dependency_name:
        type: string
    steps:
      - run:
          name: Install << parameters.dependency_name >>
          command: |
            # Link dependency in case it was found in the cache
            brew link << parameters.dependency_name >> || true

            if which << parameters.dependency_name >> > /dev/null 2>&1; then
                echo "Skipping installation, already found."
                exit 0;
            fi
            brew install << parameters.dependency_name >>
          environment:
            HOMEBREW_NO_INSTALL_CLEANUP: 1

  install-xcbeautify-for-xcode14:
    description: "Installs xcbeautify 1.6.0 using Mint"
    steps:
      - restore_cache:
          keys:
            - mint-xcbeautify-1.6.0-{{ arch }}
      - run:
          name: Install xcbeautify using Mint
          command: |
            if which xcbeautify > /dev/null 2>&1; then
                echo "xcbeautify already installed, skipping."
                exit 0
            fi
            mint install cpisciotta/xcbeautify@1.6.0
      - save_cache:
          key: mint-xcbeautify-1.6.0-{{ arch }}
          paths:
            - ~/.mint

  install-xcbeautify-for-xcode15:
    description: "Installs xcbeautify 2.30.1 using Mint"
    steps:
      - restore_cache:
          keys:
            - mint-xcbeautify-2.30.1-{{ arch }}
      - run:
          name: Install xcbeautify 2.30.1 using Mint
          command: |
            if which xcbeautify > /dev/null 2>&1; then
                echo "xcbeautify already installed, skipping."
                exit 0
            fi
            mint install cpisciotta/xcbeautify@2.30.1
      - save_cache:
          key: mint-xcbeautify-2.30.1-{{ arch }}
          paths:
            - ~/.mint

  install-rubydocker-dependencies:
    steps:
      - restore_cache:
          keys:
            - v1-rubydocker-gem-cache-{{ checksum "Gemfile.lock" }}-{{ arch }}
      - run:
          name: Bundle install
          command: bundle install --clean --path vendor/bundle
      - save_cache:
          key: v1-rubydocker-gem-cache-{{ checksum "Gemfile.lock" }}-{{ arch }}
          paths:
            - vendor/bundle

  compress_result_bundle:
    parameters:
      directory:
        type: string
      bundle_name:
        type: string
    steps:
      - run:
          name: Compress result bundle
          command: |
            tar -czf << parameters.bundle_name >>.xcresult.tar.gz << parameters.bundle_name >>.xcresult && \
            rm -r << parameters.bundle_name >>.xcresult
          working_directory: << parameters.directory >>
          when: always

  scan:
    parameters:
      directory:
        type: string
    steps:
      - run:
          name: Replace API key
          command: bundle exec fastlane replace_api_key_integration_tests
      - run:
          name: Run tests
          working_directory: << parameters.directory >>
          command: bundle exec fastlane scan
      - store_test_results:
          path: fastlane/test_output
      - store_artifacts:
          path: fastlane/test_output/report.html
          destination: test_report.html

  scan-and-archive:
    parameters:
      directory:
        type: string
    steps:
      - run:
          name: Replace API key
          command: bundle exec fastlane replace_api_key_integration_tests
      - run:
          name: Run tests
          working_directory: << parameters.directory >>
          command: bundle exec fastlane scan
      - store_test_results:
          path: fastlane/test_output
      - store_artifacts:
          path: fastlane/test_output/report.html
          destination: test_report.html
      - run:
          name: Archive
          working_directory: << parameters.directory >>
          command: |
            bundle exec fastlane archive

  scan-and-archive-all-platforms:
    parameters:
      directory:
        type: string
    steps:
      - run:
          name: Replace API key
          command: bundle exec fastlane replace_api_key_integration_tests
      - run:
          name: Run tests
          working_directory: << parameters.directory >>
          command: bundle exec fastlane scan
      - store_test_results:
          path: fastlane/test_output
      - store_artifacts:
          path: fastlane/test_output/report.html
          destination: test_report.html
      - run:
          name: Archive all platforms
          working_directory: << parameters.directory >>
          command: |
            bundle exec fastlane archive_all_platforms

  install-dependencies-scan-and-archive:
    parameters:
      directory:
        type: string
    steps:
      - install-dependencies:
          directory: << parameters.directory >>
      - scan-and-archive:
          directory: << parameters.directory >>

  setup-git-credentials:
    steps:
      - run:
          name: Setup Git config
          command: |
            git config --global user.email $GIT_EMAIL
            git config --global user.name $GIT_USERNAME

  trust-github-key:
    steps:
      - run:
          name: Trust GitHub key
          command: |
            for ip in $(dig @8.8.8.8 github.com +short); \
            do ssh-keyscan github.com,$ip; \
            ssh-keyscan $ip; \
            done 2>/dev/null >> ~/.ssh/known_hosts

  update-spm-installation-commit:
    steps:
      - run:
          name: Update git commit in targets that use SPM for dependencies
          command: |
            bundle exec fastlane update_swift_package_commit

  update-carthage-installation-commit:
    steps:
      - install-dependencies
      - run:
          name: Update git commit in Carthage Installation tests
          working_directory: Tests/InstallationTests/CarthageInstallation/
          command: |
            bundle exec fastlane update_carthage_commit

  restore-installation-test-cache:
    parameters:
      test-name:
        type: string
    steps:
      - restore_cache:
          name: "Restore cache: << parameters.test-name >>"
          keys:
            - installation-test-<< parameters.test-name >>-{{ arch }}-macos-{{ checksum ".macos_version" }}-{{ .Revision }}

  save-installation-test-cache:
    parameters:
      test-name:
        type: string
    steps:
      - save_cache:
          name: "Save cache: << parameters.test-name >>"
          key: installation-test-<< parameters.test-name >>-{{ arch }}-macos-{{ checksum ".macos_version" }}-{{ .Revision }}
          paths:
            - /tmp/cache/installation-test-<< parameters.test-name >>

  run-installation-test:
    description: "Run a single installation test with caching support"
    parameters:
      test-name:
        type: string
      display-name:
        type: string
      directory:
        type: string
      test-commands:
        type: string
    steps:
      - run:
          name: "Installation Test: << parameters.display-name >>"
          no_output_timeout: 30m
          command: |
            CACHE_DIR="/tmp/cache/installation-test-<< parameters.test-name >>"
            STATUS_FILE="/tmp/test_status/<< parameters.test-name >>"

            if [ -f "$CACHE_DIR/SUCCESS" ]; then
              echo "===== SKIPPED ====="
              echo "Test already passed for this commit."
              cat "$CACHE_DIR/SUCCESS"
              echo "SKIPPED" > "$STATUS_FILE"
              exit 0
            fi

            echo "STARTED" > "$STATUS_FILE"
            set +e
            (
              set -e
              cd << parameters.directory >>
              << parameters.test-commands >>
            )
            EXIT_CODE=$?
            set -e

            if [ $EXIT_CODE -eq 0 ]; then
              mkdir -p "$CACHE_DIR"
              echo "Passed in CircleCI job: ${CIRCLE_BUILD_URL}" > "$CACHE_DIR/SUCCESS"
              echo "PASSED" > "$STATUS_FILE"
            else
              echo "FAILED" > "$STATUS_FILE"
            fi
      - save-installation-test-cache:
          test-name: << parameters.test-name >>

  report-installation-test-result:
    description: "Report pass/fail status of an installation test"
    parameters:
      test-name:
        type: string
      display-name:
        type: string
    steps:
      - run:
          name: "Result: << parameters.display-name >>"
          when: always
          command: |
            STATUS_FILE="/tmp/test_status/<< parameters.test-name >>"
            if [ ! -f "$STATUS_FILE" ]; then
              echo "Installation Test: << parameters.display-name >> DID NOT RUN (previous step failure)"
              exit 1
            fi
            STATUS=$(cat "$STATUS_FILE")
            case "$STATUS" in
              PASSED)
                echo "Installation Test: << parameters.display-name >> PASSED"
                ;;
              SKIPPED)
                echo "Installation Test: << parameters.display-name >> SKIPPED (cached)"
                ;;
              FAILED)
                echo "Installation Test: << parameters.display-name >> FAILED"
                exit 1
                ;;
              STARTED)
                echo "Installation Test: << parameters.display-name >> DID NOT COMPLETE (likely killed by timeout)"
                exit 1
                ;;
              *)
                echo "Installation Test: << parameters.display-name >> UNKNOWN STATUS: $STATUS"
                exit 1
                ;;
            esac

  tuist-generate-workspace:
    description: "Install Tuist and generate workspace"
    parameters:
      query:
        type: string
        default: ""
        description: "Optional query to pass to Tuist when generating workspace."
    steps:
      - revenuecat/install-tuist
      - run:
          name: Generate Tuist workspace
          command: |
            export PATH="$HOME/.local/share/mise/shims:$PATH"
            if [ -n "<< parameters.query >>" ]; then
              tuist install && tuist generate << parameters.query >> --no-open
            else
              tuist install && tuist generate --no-open
            fi

  create-snapshot-pr-if-needed:
    parameters:
      version:
        type: string
      job:
        type: string
      condition:
        type: boolean
    steps:
      - when:
          condition: << parameters.condition >>
          steps:
            - setup-git-credentials
            - run:
                name: Run << parameters.job >>
                command: bundle exec fastlane << parameters.job >> version:"<< parameters.version >>"

  run-backend-tests:
    parameters:
      test_plan:
        type: string
    steps:
      - checkout
      - install-dependencies
      - update-spm-installation-commit
      - run:
          name: Run backend_integration Tests
          command: bundle exec fastlane backend_integration_tests test_plan:"<< parameters.test_plan >>"
          no_output_timeout: 5m
          environment:
            SCAN_DEVICE: iPhone 16 (18.5)
      - compress_result_bundle:
          directory: fastlane/test_output/xctest/ios
          bundle_name: BackendIntegrationTests
      - create-snapshot-pr-if-needed:
          condition: << pipeline.parameters.generate_snapshots >>
          job: "create_snapshot_pr"
          version: "BackendIntegrationTests"
      - store_test_results:
          path: fastlane/test_output
      - store_artifacts:
          path: fastlane/test_output/xctest
          destination: scan-test-output

  checkout-with-minimal-permissions:
    steps:
      - revenuecat/remove-all-ssh-keys
      - revenuecat/checkout-with-key:
          fingerprint: "SHA256:TY+ziSK99HtCkgT7rILg/o2G05KSV8BxmQht0ApvYng"
      - revenuecat/assert-git-clone-fails:
          repository: paywall-preview-resources
      - revenuecat/assert-git-clone-fails:
          repository: paywall-rendering-validation
      - revenuecat/assert-git-clone-fails:
          repository: khepri
      - set-signing-repo-deploy-key-for-git

  # Will configure git to use the deploy key for the private certificates repo from now on.
  set-signing-repo-deploy-key-for-git:
    steps:
      - revenuecat/set-ssh-key-for-git:
          fingerprint: "SHA256:UYi3gsOInLRPZy6MPho7Yr/YK1VmjDvPGo7sJvIcnPM"

jobs:
  validate-package-swift:
    parameters:
      xcode_version:
        type: string
      mac_os_executor_name:
        type: string
    executor:
      name: << parameters.mac_os_executor_name >>
      xcode_version: << parameters.xcode_version >>
    steps:
      - checkout
      - run:
          name: Validate Package.swift
          command: swift package describe

  spm-release-build-xcode-14:
    executor:
      name: macos-executor
      xcode_version: "14.3.1"

    steps:
      - checkout
      - run:
          name: SPM Release Build
          command: swift build -c release --target RevenueCat
          no_output_timeout: 30m
      - slack-notify-on-fail

  spm-release-build-xcode-15:
    executor:
      name: macos-executor
      xcode_version: "15.4.0"

    steps:
      - checkout
      - run:
          name: SPM Release Build
          command: swift build -c release --target RevenueCat
          no_output_timeout: 30m
      - slack-notify-on-fail

  pod-lib-lint:
    executor:
      name: macos-executor
    steps:
      - checkout
      - install-dependencies
      - run:
          name: Check pods and deployment targets
          command: bundle exec fastlane check_pods

  spm-release-build:
    executor:
      name: macos-executor
    steps:
      - checkout
      - run:
          name: SPM Release Build
          command: swift build -c release --target RevenueCat
          no_output_timeout: 30m
      - run:
          name: SPM RevenueCatUI Release Build
          command: swift build -c release --target RevenueCatUI
          no_output_timeout: 30m
      - slack-notify-on-fail

  api-tests:
    executor:
      name: macos-executor
      xcode_version: "16.4"
    steps:
      - checkout
      - install-dependencies
      - tuist-generate-workspace
      - run:
          name: API Tests
          command: bundle exec fastlane run_api_tests
      - slack-notify-on-fail

  spm-receipt-parser:
    executor:
      name: macos-executor
    steps:
      - checkout
      - run:
          name: SPM Receipt Parser
          command: swift build -c release --target ReceiptParser
          no_output_timeout: 30m
      - slack-notify-on-fail

  spm-revenuecat-ui-ios-15:
    executor:
      name: macos-executor
      xcode_version: "14.3.1"

    steps:
      - checkout
      # xcbeautify not needed: test_revenuecatui uses xcodebuild directly
      # which uses xcpretty
      - install-dependencies:
          install_xcbeautify: false
      - update-spm-installation-commit
      - run:
          name: SPM RevenueCatUI Tests
          command: bundle exec fastlane test_revenuecatui
          no_output_timeout: 5m
          environment:
            DEVICE: iPhone 13,OS=15.5
      - create-snapshot-pr-if-needed:
          condition: << pipeline.parameters.generate_revenuecatui_snapshots >>
          job: "create_snapshot_pr"
          version: "revenuecatui-15"
      - create-snapshot-pr-if-needed:
          condition: << pipeline.parameters.generate_revenuecatui_snapshots >>
          job: "create_snapshots_repo_pr"
          version: "revenuecatui-15"
      - compress_result_bundle:
          directory: fastlane/test_output
          bundle_name: revenuecatui
      - store_test_results:
          path: fastlane/test_output/revenuecatui/tests.xml
      - store_artifacts:
          path: fastlane/test_output
          destination: scan-test-output
      - slack-notify-on-fail

  spm-revenuecat-ui-ios-16:
    executor:
      name: macos-executor
      xcode_version: "15.4.0"

    steps:
      - checkout
      # xcbeautify not needed: test_revenuecatui uses xcodebuild directly
      # which uses xcpretty
      - install-dependencies:
          install_xcbeautify: false
      - update-spm-installation-commit
      - run:
          name: SPM RevenueCatUI Release Build
          command: swift build -c release --target RevenueCatUI
          no_output_timeout: 5m
      - run:
          name: SPM RevenueCatUI Tests
          command: bundle exec fastlane test_revenuecatui
          no_output_timeout: 5m
          environment:
            DEVICE: iPhone 14,OS=16.4
      - create-snapshot-pr-if-needed:
          condition: << pipeline.parameters.generate_revenuecatui_snapshots >>
          job: "create_snapshot_pr"
          version: "revenuecatui-16"
      - create-snapshot-pr-if-needed:
          condition: << pipeline.parameters.generate_revenuecatui_snapshots >>
          job: "create_snapshots_repo_pr"
          version: "revenuecatui-16"
      - compress_result_bundle:
          directory: fastlane/test_output
          bundle_name: revenuecatui
      - store_test_results:
          path: fastlane/test_output/revenuecatui/tests.xml
      - store_artifacts:
          path: fastlane/test_output
          destination: scan-test-output
      - slack-notify-on-fail

  run-revenuecat-ui-ios-17:
    executor:
      name: macos-executor
      xcode_version: "15.4.0"

    steps:
      - checkout
      # xcbeautify not needed: test_revenuecatui uses xcodebuild directly
      # which uses xcpretty
      - install-dependencies:
          install_xcbeautify: false
      - update-spm-installation-commit
      - run:
          name: SPM RevenueCatUI Release Build
          command: swift build -c release --target RevenueCatUI
          no_output_timeout: 5m
      - run:
          name: SPM RevenueCatUI Tests
          command: bundle exec fastlane test_revenuecatui
          no_output_timeout: 15m
          environment:
            DEVICE: iPhone 15 Pro,OS=17.5
      - create-snapshot-pr-if-needed:
          condition: << pipeline.parameters.generate_revenuecatui_snapshots >>
          job: "create_snapshot_pr"
          version: "revenuecatui-17"
      - create-snapshot-pr-if-needed:
          condition: << pipeline.parameters.generate_revenuecatui_snapshots >>
          job: "create_snapshots_repo_pr"
          version: "revenuecatui-17"
      - compress_result_bundle:
          directory: fastlane/test_output
          bundle_name: revenuecatui
      - store_test_results:
          path: fastlane/test_output/revenuecatui/tests.xml
      - store_artifacts:

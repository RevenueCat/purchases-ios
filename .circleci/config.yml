      - run:
          name: Build Paywalls Tester
          command: bundle exec fastlane build_paywalls_tester_for_emerge

  emerge_binary_size_analysis:
    executor:
      name: macos-executor
    steps:
      - checkout
      - setup-git-credentials
      - trust-github-key
      - install-dependencies

      # LOCAL_SOURCE
      - run:
          name: Set BinarySizeTest integration method (LOCAL_SOURCE)
          command: |
            echo 'export TUIST_BINARY_SIZE_TEST_INTEGRATION_METHOD=LOCAL_SOURCE' >> "$BASH_ENV"
      - tuist-generate-workspace:
          query: "BinarySizeTest"
      - run:
          name: Build BinarySizeTest (LOCAL_SOURCE) and upload to Emerge
          command: bundle exec fastlane build_and_upload_emerge_binary_size_analysis integration_method:LOCAL_SOURCE

      # CocoaPods
      - run:
          name: Set BinarySizeTest integration method (COCOAPODS)
          command: |
            echo 'export TUIST_BINARY_SIZE_TEST_INTEGRATION_METHOD=COCOAPODS' >> "$BASH_ENV"
      - tuist-generate-workspace:
          query: "BinarySizeTest"
      - run:
          name: Build BinarySizeTest (COCOAPODS) and upload to Emerge
          command: bundle exec fastlane build_and_upload_emerge_binary_size_analysis integration_method:COCOAPODS

      # SPM
      - run:
          name: Set BinarySizeTest integration method (SPM)
          command: |
            echo 'export TUIST_BINARY_SIZE_TEST_INTEGRATION_METHOD=SPM' >> "$BASH_ENV"
      - tuist-generate-workspace:
          query: "BinarySizeTest"
      - run:
          name: Build BinarySizeTest (SPM) and upload to Emerge
          command: bundle exec fastlane build_and_upload_emerge_binary_size_analysis integration_method:SPM

  record-and-push-paywall-template-screenshots:
    description: "Record new paywall template screenshots with Paparazzi and push them to the paywall-rendering-validation repository"

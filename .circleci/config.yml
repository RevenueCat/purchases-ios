version: 2.1

setup: true

orbs:
  continuation: circleci/continuation@1.1.0

# These parameters mirror the ones in continue_config.yml so that
# externally-triggered pipelines (API, scheduled, GitHub Actions) can
# pass values through to the continuation config.
parameters:
  action:
    type: enum
    enum:
      [
        default,
        bump,
        run-manual-tests,
        run-manual-docs-deploy,
        update_paywall_templates,
        record_paywall_screenshots,
        tuist,
        deploy_rct_tester
      ]
    default: default
  generate_snapshots:
    default: false
    type: boolean
  generate_revenuecatui_snapshots:
    default: false
    type: boolean
  generate_swiftinterface:
    default: false
    type: boolean
  GHA_Event:
    type: string
    default: ""
  GHA_Actor:
    type: string
    default: ""
  GHA_Action:
    type: string
    default: ""
  GHA_Meta:
    type: string
    default: ""
  # Set via CircleCI API by the bot-test-trigger GitHub Action when
  # a PR comment like "@RCGitBot please test <job-name>" is posted.
  requested_job:
    type: string
    default: ""

jobs:
  setup-dynamic-config:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - checkout
      - run:
          name: Determine pipeline configuration
          command: |
            REQUESTED_JOB="<< pipeline.parameters.requested_job >>"

            if [ -n "$REQUESTED_JOB" ]; then
              echo "On-demand job requested: $REQUESTED_JOB"

              # Write the on-demand config generator script. This validates
              # the requested job exists, then generates a minimal continuation
              # config that runs only that job.
              cat > /tmp/generate-on-demand-config.py \<< 'PYEOF'
            import sys, re, textwrap

            job_name = sys.argv[1]
            config_path = ".circleci/continue_config.yml"

            with open(config_path) as f:
                content = f.read()

            # Extract the jobs section (between "^jobs:" and "^workflows:")
            jobs_match = re.search(r'^jobs:\n(.*?)^workflows:', content, re.MULTILINE | re.DOTALL)
            if not jobs_match:
                print("ERROR: Could not find jobs section in config")
                sys.exit(1)

            jobs_section = jobs_match.group(1)
            defined_jobs = re.findall(r'^  (\S+):', jobs_section, re.MULTILINE)

            if job_name not in defined_jobs:
                print(f"ERROR: Job '{job_name}' not found in continue_config.yml")
                print(f"Available jobs: {', '.join(sorted(defined_jobs))}")
                sys.exit(1)

            print(f"Job '{job_name}' found. Generating on-demand config...")

            workflows_pos = content.index("\nworkflows:\n")
            base_config = content[:workflows_pos + 1]

            on_demand_workflow = textwrap.dedent(f"""\
            workflows:
              on-demand-job:
                jobs:
                  - {job_name}:
                      context:
                        - slack-secrets
            """)

            generated_path = "/tmp/on-demand-config.yml"
            with open(generated_path, "w") as f:
                f.write(base_config)
                f.write(on_demand_workflow)

            print(f"Generated on-demand config at {generated_path}")
            PYEOF

              python3 /tmp/generate-on-demand-config.py "$REQUESTED_JOB"

              # For on-demand jobs we only need minimal parameters (the
              # continuation config still declares them, defaults are fine).
              echo '{}' > /tmp/pipeline-parameters.json
            else
              echo "Normal pipeline — forwarding parameters to continuation config"

              python3 -c "
            import json, sys
            params = {
                'action': sys.argv[1],
                'generate_snapshots': sys.argv[2] == 'true',
                'generate_revenuecatui_snapshots': sys.argv[3] == 'true',
                'generate_swiftinterface': sys.argv[4] == 'true',
                'GHA_Event': sys.argv[5],
                'GHA_Actor': sys.argv[6],
                'GHA_Action': sys.argv[7],
                'GHA_Meta': sys.argv[8],
            }
            with open('/tmp/pipeline-parameters.json', 'w') as f:
                json.dump(params, f, indent=2)
            print('Generated parameters:')
            print(json.dumps(params, indent=2))
              " \
                "<< pipeline.parameters.action >>" \
                "<< pipeline.parameters.generate_snapshots >>" \
                "<< pipeline.parameters.generate_revenuecatui_snapshots >>" \
                "<< pipeline.parameters.generate_swiftinterface >>" \
                "<< pipeline.parameters.GHA_Event >>" \
                "<< pipeline.parameters.GHA_Actor >>" \
                "<< pipeline.parameters.GHA_Action >>" \
                "<< pipeline.parameters.GHA_Meta >>"
            fi
      - when:
          condition: << pipeline.parameters.requested_job >>
          steps:
            - continuation/continue:
                parameters: /tmp/pipeline-parameters.json
                configuration_path: /tmp/on-demand-config.yml
      - unless:
          condition: << pipeline.parameters.requested_job >>
          steps:
            - continuation/continue:
                parameters: /tmp/pipeline-parameters.json
                configuration_path: .circleci/continue_config.yml

workflows:
  setup:
    jobs:
      - setup-dynamic-config

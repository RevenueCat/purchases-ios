    steps:
      - checkout
      - setup-git-credentials
      - install-rubydocker-dependencies
      - run:
          name: Trigger RC App Pipeline
          command: bundle exec fastlane trigger_bump_sdk_in_rc_mobile_app

workflows:

  generate-swiftinterface:
    when: << pipeline.parameters.generate_swiftinterface >>
    jobs:
      - generate-swiftinterface:
          context:
            - slack-secrets-ios

  generate-snapshot:
    when: << pipeline.parameters.generate_snapshots >>
    jobs:
      - run-test-ios-26
      - run-test-ios-18
      - run-test-ios-17
      - run-test-ios-16
      - run-test-ios-15
      - run-test-ios-14
      - run-test-macos
      - run-test-watchos
      - backend-integration-tests-SK2 # Snapshots from this job are shared with all BackendIntegrationTests


  generate_revenuecatui_snapshots:
    when: << pipeline.parameters.generate_revenuecatui_snapshots >>
    jobs:
      - spm-revenuecat-ui-ios-15
      - spm-revenuecat-ui-ios-16
      - run-revenuecat-ui-ios-17
      - run-revenuecat-ui-ios-18
      - run-revenuecat-ui-ios-26
      - spm-revenuecat-ui-watchos

  build-test:
    when:
      and:
        - not:
            equal: [scheduled_pipeline, << pipeline.trigger_source >>]
        - not:
            equal: ["release-train", << pipeline.schedule.name >>]
        - not:
            equal: [bump, << pipeline.parameters.action >>]
        - not: << pipeline.parameters.generate_snapshots >>
        - not: << pipeline.parameters.generate_revenuecatui_snapshots >>
        - not: << pipeline.parameters.generate_swiftinterface >>
    jobs:
      - lint
      - check-api-changes:
          context:
            - slack-secrets-ios
      - validate-package-swift:
          name: validate-package-swift-5.8
          xcode_version: "14.3.1"
          mac_os_executor_name: macos-executor
      - run-test-ios-18
      - run-test-ios-26
      - pod-lib-lint
      - run-revenuecat-ui-ios-18
      - run-revenuecat-ui-ios-26
      - emerge_purchases_ui_snapshot_tests
      - emerge_binary_size_analysis

  create-tag:
    when:
      and:
        - not:
            equal: [scheduled_pipeline, << pipeline.trigger_source >>]
        - matches:
            pattern: "^release/.*$"
            value: << pipeline.git.branch >>
    jobs:
      - release-checks
      - hold:
          type: approval
          requires:
            - release-checks
      - tag-release-branch:
          requires:
            - hold

  deploy-tag:
    when:
      not:
        equal: [scheduled_pipeline, << pipeline.trigger_source >>]
    jobs:
      - make-release:
          <<: *release-tags
      - push-revenuecat-pod:
          requires:
            - make-release
          <<: *release-tags
      - push-revenuecatui-pod:
          requires:
            - push-revenuecat-pod
          <<: *release-tags
      - deploy-to-spm:
          requires:
            - make-release
          <<: *release-tags
      - docs-deploy:
          requires:
            - make-release
          <<: *release-tags
      - deploy-purchase-tester:
          dry_run: false
          requires:
            - make-release
          <<: *release-tags
      - deploy-rct-tester:
          dry_run: false
          requires:
            - make-release
          <<: *release-tags
      - bump-sdk-in-rc-mobile-app:
          requires:
            - make-release
          <<: *release-tags

  snapshot-bump:
    when:
      and:
        - not:
            equal: [scheduled_pipeline, << pipeline.trigger_source >>]
        - not:
            equal: ["release-train", << pipeline.schedule.name >>]
        - not:
            equal: [bump, << pipeline.parameters.action >>]
    jobs:
      - prepare-next-version:
          <<: *only-main-branch

  danger:
    jobs:
      - danger

  weekly-run-workflow:
    when:
      and:
        - equal: [scheduled_pipeline, << pipeline.trigger_source >>]
        - equal: ["release-train", << pipeline.schedule.name >>]
    jobs:
      - release-train

  daily-loadshedder-integration-tests:
    when:
      and:
        - equal: [scheduled_pipeline, << pipeline.trigger_source >>]
        - equal:
            ["load_shedder_integration_tests", << pipeline.schedule.name >>]
    jobs:
      - loadshedder-integration-tests-old-major:
          name: loadshedder-integration-tests-v3
          major: "3"
          context:
            - slack-secrets
      - loadshedder-integration-tests-old-major:
          name: loadshedder-integration-tests-v4
          major: "4"
          context:
            - slack-secrets
      - integration-tests-all:
          context:
            - slack-secrets

  daily-maestro-e2e-tests:
    when:
      and:
        - equal: [scheduled_pipeline, << pipeline.trigger_source >>]
        - equal: ["maestro_e2e_tests", << pipeline.schedule.name >>]
    jobs:
      - run-all-maestro-e2e-tests:
          context:
            - e2e-tests
            - slack-secrets

  manual-trigger-bump:
    when:
      equal: [bump, << pipeline.parameters.action >>]
    jobs:
      - release-train

  record-and-push-paywall-template-screenshots:
    when:
      or:
        - equal:
            ["record_paywall_screenshots", << pipeline.parameters.action >>]
        - and:
            - not:
                equal: [scheduled_pipeline, << pipeline.trigger_source >>]
            - equal: ["main", << pipeline.git.branch >>]
            - equal: ["default", << pipeline.parameters.action >>]
    jobs:
      - record-and-push-paywall-template-screenshots:
          context:
            - paywall-rendering-validation-pr-rw

  update-paywall-templates:
    when:
      equal: [update_paywall_templates, << pipeline.parameters.action >>]
    jobs:
      - update-paywall-preview-resources-commit

  manual-trigger-docs-deploy:
    when:
      equal: [run-manual-docs-deploy, << pipeline.parameters.action >>]
    jobs:
      - docs-deploy

  # The deployment of the RCT Tester app can be done manually from CircleCI
  # by triggering the pipeline with the "deploy_rct_tester" action
  manual-deploy-rct-tester:
    when:
      equal: [deploy_rct_tester, << pipeline.parameters.action >>]
    jobs:
      - deploy-rct-tester:
          dry_run: false

  # To trigger tests manually, log into circleCI, select the project, a branch, and then click "Trigger Pipeline"
  # in the top right hand corner of the screen. In the modal that appears, set the following parameter fields
  # and click "Trigger Pipeline" to begin the pipeline:
  #   - Parameter Type: string
  #   - Name: action
  #   - Value: run-manual-tests
  all-tests:
    when:
      and:
        - not:
            equal: ["release-train", << pipeline.schedule.name >>]
        - not:
            equal: [bump, << pipeline.parameters.action >>]
        - or:
          - matches:
              pattern: "^(release/.*|main)$"
              value: << pipeline.git.branch >>
          - equal: ["run-manual-tests", << pipeline.parameters.action >>]
          - equal:
              ["run-from-github-comments", << pipeline.parameters.GHA_Meta >>]
    jobs:
      - check-api-changes:
          context:
            - slack-secrets-ios
      - run-all-maestro-e2e-tests:
          context:
            - e2e-tests
            - slack-secrets
      - backend-integration-tests-SK1:
          context:
            - slack-secrets
      - backend-integration-tests-SK2:
          context:
            - slack-secrets
      - backend-integration-tests-custom-entitlements:
          context:
            - slack-secrets
      - backend-integration-tests-other:
          context:
            - slack-secrets
      - backend-integration-tests-offline:
          context:
            - slack-secrets
      - build-tv-watch-mac-and-visionos:
          context:
            - slack-secrets
      - docs-build:
          context:
            - slack-secrets
      - run-test-ios-14:
          context:
            - slack-secrets
      - run-test-ios-15:
          context:
            - slack-secrets
      - run-test-ios-16:
          context:
            - slack-secrets
      - run-test-ios-17:
          context:
            - slack-secrets
      - run-test-macos:
          context:
            - slack-secrets
      - run-test-tvos:
          context:
            - slack-secrets
      - run-test-watchos:
          context:
            - slack-secrets
      - spm-receipt-parser:
          context:
            - slack-secrets
      - spm-release-build:
          context:
            - slack-secrets
      - spm-release-build-xcode-14:
          context:
            - slack-secrets
      - spm-release-build-xcode-15:
          context:
            - slack-secrets
      - spm-revenuecat-ui-ios-15:
          context:
            - slack-secrets
      - spm-revenuecat-ui-ios-16:
          context:
            - slack-secrets
      - run-revenuecat-ui-ios-17:
          context:
            - slack-secrets
      - spm-revenuecat-ui-watchos:
          context:
            - slack-secrets
      - installation-tests-all-but-carthage:
          context:
            - slack-secrets
      - installation-tests-carthage:
          context:
            - slack-secrets
      - api-tests:
          context:
            - slack-secrets
      - deploy-purchase-tester:
          dry_run: true
          context:
            - slack-secrets
      - emerge_binary_size_analysis:
          context:
            - slack-secrets



          destination: revenuecat-api-ios.swiftinterface
      - store_artifacts:
          path: /tmp/pr-swiftinterface/RevenueCat-macos.swiftinterface
          destination: revenuecat-api-macos.swiftinterface
      - store_artifacts:
          path: /tmp/pr-swiftinterface/RevenueCat-watchos-simulator.swiftinterface
          destination: revenuecat-api-watchos-simulator.swiftinterface
      - store_artifacts:
          path: /tmp/pr-swiftinterface/RevenueCat-watchos.swiftinterface
          destination: revenuecat-api-watchos.swiftinterface
      - store_artifacts:
          path: /tmp/pr-swiftinterface/RevenueCat-tvos-simulator.swiftinterface
          destination: revenuecat-api-tvos-simulator.swiftinterface
      - store_artifacts:
          path: /tmp/pr-swiftinterface/RevenueCat-tvos.swiftinterface
          destination: revenuecat-api-tvos.swiftinterface
      - store_artifacts:
          path: /tmp/pr-swiftinterface/RevenueCat-visionos-simulator.swiftinterface
          destination: revenuecat-api-visionos-simulator.swiftinterface
      - store_artifacts:
          path: /tmp/pr-swiftinterface/RevenueCat-visionos.swiftinterface
          destination: revenuecat-api-visionos.swiftinterface

version: 2.1

setup: true

orbs:
  continuation: circleci/continuation@1.1.0

# Pipeline parameters accepted via the API / CircleCI UI.
# All parameters declared here are implicitly forwarded to default_config.yml.
parameters:
  action:
    type: enum
    enum:
      [
        default,
        bump,
        run-manual-docs-deploy,
        update_paywall_templates,
        record_paywall_screenshots,
        deploy_rct_tester
      ]
    default: default
  generate_snapshots:
    type: boolean
    default: false
  generate_revenuecatui_snapshots:
    type: boolean
    default: false
  generate_swiftinterface:
    type: boolean
    default: false
  # Set via CircleCI API by the GitHub Action when a PR comment like
  # "@RCGitBot please test <job1> <job2> <job3>" is posted.
  requested_jobs:
    type: string
    default: ""
  # params used by the trigger CircleCI Pipeline GitHub Action: https://github.com/marketplace/actions/trigger-circleci-pipeline
  GHA_Event:
    type: string
    default: ""
  GHA_Actor:
    type: string
    default: ""
  GHA_Action:
    type: string
    default: ""
  GHA_Meta:
    type: string
    default: ""

jobs:
  setup-dynamic-config:
    docker:
      - image: cimg/node:current
    resource_class: small
    steps:
      - checkout
      - when:
          condition: << pipeline.parameters.requested_jobs >>
          steps:
            - run:
                name: Generate requested jobs configuration
                environment:
                  REQUESTED_JOBS: << pipeline.parameters.requested_jobs >>
                command: node .circleci/generate-requested-jobs-config.js
            - continuation/continue:
                configuration_path: /tmp/requested-jobs-config.yml
      - unless:
          condition: << pipeline.parameters.requested_jobs >>
          steps:
            - run:
                name: Determine path-based pipeline parameters
                command: |
                  # Detect changes in paths that require deploying PaywallsTester.
                  # The deploy-paywalls-tester workflow is additionally gated on
                  # branch=main and not-scheduled in default_config.yml.
                  DEPLOY_PAYWALLS_TESTER=false
                  if git rev-parse HEAD~1 >/dev/null 2>&1; then
                    CHANGED=$(git diff HEAD~1 --name-only -- RevenueCatUI/ Tests/TestingApps/PaywallsTester/)
                    if [ -n "$CHANGED" ]; then
                      DEPLOY_PAYWALLS_TESTER=true
                      echo "PaywallsTester-relevant changes detected:"
                      echo "$CHANGED"
                    else
                      echo "No changes in RevenueCatUI/ or Tests/TestingApps/PaywallsTester/"
                    fi
                  else
                    echo "No parent commit found (initial commit?), skipping path check"
                  fi

                  # Only pass the computed param; other pipeline parameters (action,
                  # generate_*, GHA_*, etc.) are implicitly forwarded by CircleCI.
                  # run_deploy_paywalls_tester is declared only in default_config.yml,
                  # so it won't trigger the "Conflicting pipeline parameters" error.
                  echo "{\"run_deploy_paywalls_tester\": ${DEPLOY_PAYWALLS_TESTER}}" > /tmp/pipeline-parameters.json
                  echo "Generated /tmp/pipeline-parameters.json:"
                  cat /tmp/pipeline-parameters.json
            - continuation/continue:
                configuration_path: .circleci/default_config.yml
                parameters: /tmp/pipeline-parameters.json

workflows:
  setup:
    jobs:
      - setup-dynamic-config:
          filters:
            tags:
              only: /.*/

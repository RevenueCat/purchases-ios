version: 2.1

setup: true

orbs:
  continuation: circleci/continuation@1.1.0

# Pipeline parameters accepted via the API / CircleCI UI.
# All parameters declared here are implicitly forwarded to continue_config.yml.
parameters:
  action:
    type: enum
    enum:
      [
        default,
        bump,
        run-manual-tests,
        run-manual-docs-deploy,
        update_paywall_templates,
        record_paywall_screenshots,
        deploy_rct_tester
      ]
    default: default
  generate_snapshots:
    type: boolean
    default: false
  generate_revenuecatui_snapshots:
    type: boolean
    default: false
  generate_swiftinterface:
    type: boolean
    default: false
  # Accepted for the GitHub Action trigger.
  GHA_Event:
    type: string
    default: ""
  GHA_Actor:
    type: string
    default: ""
  GHA_Action:
    type: string
    default: ""
  GHA_Meta:
    type: string
    default: ""

jobs:
  setup-dynamic-config:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - checkout
      - continuation/continue:
          configuration_path: .circleci/continue_config.yml

workflows:
  setup:
    jobs:
      - setup-dynamic-config

# Opens a workflow offering (`default_workflows`) while the /v1/config endpoint is unreachable
# (a transport failure, simulating no network), on a cold cache (`clearState`). Unlike the 4xx
# case (workflow_config_fallback.yaml, a session kill-switch), a connection-level failure has no
# HTTP status, so the SDK takes the "fall back to cache" path; with nothing cached it degrades to
# the classic single-page paywall (the workflow's last page) and never crashes.
#
# The `remote_config_network_error` strategy routes config requests to an unreachable host, so the
# app receives a real URLError. Offerings are not blocked, so the offering still resolves and a
# paywall is presentable. The force_server_error_strategy launch argument is read by Constants.
#
# Run locally against the test store:
#   maestro test -e MAESTRO_STORE=test_store Examples/rc-maestro/maestro/workflows/workflow_offline_fallback.yaml

appId: com.revenuecat.maestro.ios
name: Workflow offering falls back to the classic paywall when config is offline
env:
  MAESTRO_STORE: ${MAESTRO_STORE || 'test_store'}

---
- clearState
# Dismiss any leftover system alerts from previous test runs.
- pressKey: home
- launchApp:
    arguments:
        e2e_test_flow: open_workflow
        force_server_error_strategy: remote_config_network_error
- assertVisible: "entitlement (pro): nil"
# Wait for offerings to load before the button appears.
- extendedWaitUntil:
    visible: "Present Paywall"
    timeout: 20000
- tapOn:
    text: "Present Paywall"

# With /v1/config unreachable and nothing cached, the classic single-page paywall is shown.
- extendedWaitUntil:
    visible: "People Who Meditate Daily Sleep 40% Better"
    timeout: 15000
# The multipage workflow entry screen is never rendered in the offline fallback path.
- assertNotVisible: "Start Your Free Week And Reclaim 30+ Minutes Daily"
- takeScreenshot: "workflow_offline_fallback - classic paywall"
